<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="style1.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
</head>

<body>

<div class="navbar">
    <h2>SmartExpiry</h2>
    <button onclick="logout()">Logout</button>
</div>

<div id="notify"></div>

<div class="stats">
    <div class="stat-card"><h3>Total</h3><p id="total">0</p></div>
    <div class="stat-card green"><h3>Fresh</h3><p id="fresh">0</p></div>
    <div class="stat-card yellow"><h3>Expiring</h3><p id="warning">0</p></div>
    <div class="stat-card red"><h3>Expired</h3><p id="expired">0</p></div>
</div>

<div class="chart-box">
    <canvas id="myChart"></canvas>
</div>

<div class="form">
    <input type="text" id="name" placeholder="Product Name">
    <input type="date" id="date">
    <button onclick="addItem()">Add</button>
</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="javas/firebase.js"></script>
<script src="javas/script1.js"></script>

<script>
function logout(){
    auth.signOut().then(()=>window.location.href="login1.html");
}
</script>

</body>
</html>
